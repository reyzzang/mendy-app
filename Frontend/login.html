<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mendy Login</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <h1>Mendy</h1>
      <p>Login with your phone number and password.</p>

      <div id="passwordLoginBox">
        <input id="loginPhoneNumber" type="text" placeholder="+995555111222" />
        <input id="loginPassword" type="password" placeholder="Password" />

        <button id="passwordLoginBtn" type="button">Login</button>

        <p class="small-text">
          First time here?
          <button id="showOtpBtn" type="button" class="link-btn">Verify phone</button>
        </p>
      </div>

      <div id="otpLoginBox" class="hidden">
        <input id="phoneNumber" type="text" placeholder="+995555111222" />

        <button id="sendCodeBtn" type="button">Send Code</button>

        <input id="otpCode" type="text" placeholder="Enter SMS code" />

        <button id="verifyCodeBtn" type="button">Verify Code</button>

        <input id="newPassword" type="password" placeholder="Create password" />

        <button id="setPasswordBtn" type="button">Save Password</button>

        <p class="small-text">
          Already verified?
          <button id="showPasswordLoginBtn" type="button" class="link-btn">Login with password</button>
        </p>
      </div>

      <p id="message"></p>
    </div>
  </main>

  <script src="./js/config.js"></script>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
